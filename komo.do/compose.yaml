################################
# 🦎 KOMODO COMPOSE - MONGO 🦎 #
################################

services:
  mongo:
    image: mongo:7
    container_name: komodo-mongo
    labels:
      komodo.skip: ""
    command: ["mongod", "--quiet", "--wiredTigerCacheSizeGB", "0.25"]
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      MONGO_INITDB_ROOT_USERNAME: ${KOMODO_DB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${KOMODO_DB_PASSWORD}
    volumes:
      - /data/services/komodo/mongo/data:/data/db
      - /data/services/komodo/mongo/config:/data/configdb
    mem_limit: 768m
    cpus: "0.40"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  core:
    image: ghcr.io/moghtech/komodo-core:${COMPOSE_KOMODO_IMAGE_TAG:-latest}
    container_name: komodo-core
    labels:
      komodo.skip: ""
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "9120:9120"
    env_file: .env
    environment:
      KOMODO_DATABASE_ADDRESS: mongo:27017
      KOMODO_DATABASE_USERNAME: ${KOMODO_DB_USERNAME}
      KOMODO_DATABASE_PASSWORD: ${KOMODO_DB_PASSWORD}
    volumes:
      - /data/services/komodo/core/backups:/backups
    mem_limit: 1g
    cpus: "0.50"

  periphery:
    image: ghcr.io/moghtech/komodo-periphery:${COMPOSE_KOMODO_IMAGE_TAG:-latest}
    container_name: komodo-periphery
    labels:
      komodo.skip: ""
    restart: unless-stopped
    env_file: .env
    ports:
      - "8120:8120"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/proc
      - /data/services/komodo/periphery:/etc/komodo
    mem_limit: 512m
    cpus: "0.50"
